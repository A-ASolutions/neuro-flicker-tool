<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Neuro Flicker — Clean 30/40 Hz + 1 Hz bursts (phase-locked)</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root{ --bg:#000; --ink:#fff; }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;overflow:hidden}
  canvas{display:block}
  #ui{
    position:fixed;top:16px;left:16px;z-index:10;
    background:rgba(0,0,0,.72);backdrop-filter:blur(2px);
    padding:14px 16px;border-radius:12px;line-height:1.45;max-width:520px;
    transition:opacity .4s ease, visibility .4s ease;
  }
  #ui.hidden{opacity:0;visibility:hidden;pointer-events:none}
  #ui label{display:block;margin:6px 0}
  #ui input[type="number"]{width:90px}
  button{cursor:pointer}
  #t{margin-top:6px;font-weight:700}
  #inf{margin-top:4px;font-size:13px;opacity:.9}
  #panel{display:grid;grid-template-columns:1fr;gap:8px}
  #burstControls,#altControls,#freqControls{padding:8px;border-radius:8px;background:rgba(255,255,255,.06)}
  #brand{
    position:fixed;right:10px;bottom:10px;z-index:9;
    background:rgba(0,0,0,.5);padding:6px 10px;border-radius:8px;
    font-size:12px;user-select:none
  }
</style>
</head>
<body>
  <div id="ui">
    <div id="panel">

      <!-- Frequency mode -->
      <div id="freqControls">
        <strong>Frequency mode</strong>
        <label><input type="radio" name="fmode" value="auto" checked> Auto</label>
        <div style="display:flex;gap:10px;align-items:center">
          <label style="margin:0"><input type="radio" name="fmode" value="manual" id="fman"> Manual (≥120 Hz only)</label>
          <select id="manualHz" style="width:110px">
            <option value="30">30 Hz</option>
            <option value="40">40 Hz</option>
          </select>
        </div>
        <small style="opacity:.85">Auto: 30 Hz on 60 Hz; 40 Hz on ≥120 Hz. Manual unlocks only when your display is ≥120 Hz.</small>
      </div>

      <div>
        <strong>Display mode</strong>
        <label><input type="radio" name="mode" value="clinical" checked> Clinical (black/white)</label>
        <label><input type="radio" name="mode" value="safe"> Dim (full-field)</label>
        <div style="display:flex;gap:10px;align-items:center;margin-left:24px">
          <span>Brightness:</span> <input id="b" type="range" min="0" max="255" value="136" style="flex:1">
        </div>
        <label><input type="radio" name="mode" value="panel"> Panel-safe (soft gradient)</label>
      </div>

      <hr style="border:none;border-top:1px solid rgba(255,255,255,.15);margin:0">

      <div>
        <strong>Pattern</strong>
        <label><input type="radio" name="pattern" value="continuous" checked> Continuous 30/40 Hz</label>
        <label><input type="radio" name="pattern" value="bursts"> 1 Hz gamma bursts</label>
        <label><input type="radio" name="pattern" value="alternate"> Alternation (cont. ↔ bursts)</label>

        <div id="burstControls" style="display:none">
          <label>Duty (burst ON %): <input id="duty" type="range" min="10" max="90" value="50"> <span id="dutyVal">50%</span></label>
          <label>Waveform:
            <select id="wf">
              <option value="sine" selected>Sine (smooth)</option>
              <option value="pulse">Pulse (crisp)</option>
            </select>
          </label>
        </div>

        <div id="altControls" style="display:none">
          <label>Alternation interval (s): <input id="altSec" type="number" min="15" max="180" step="5" value="60"></label>
          <div style="font-size:12px;opacity:.85">Switches every N seconds; oscillator phase is preserved (no jump).</div>
        </div>
      </div>

      <div>
        <label>Duration (min): <input id="mins" type="number" min="1" max="60" value="4"></label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
          <button id="start">Start</button>
          <button id="stop">Stop</button>
          <button id="fs">Fullscreen</button>
        </div>
        <div id="t">Remaining: 00:00</div>
        <div id="inf">Detecting refresh…</div>
      </div>
    </div>
  </div>

  <div id="brand">Designed by Meaningful Path Therapy (Abdullah Al-Shoaibi)</div>
  <canvas id="cv"></canvas>

<script>
/* ---------- FIX: declare cacheGradient BEFORE any use ---------- */
let cacheGradient = null;

/* ---------- Canvas & sizing ---------- */
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d',{alpha:false});
function fit(){cv.width=innerWidth;cv.height=innerHeight;cacheGradient=null;}
addEventListener('resize',fit,{passive:true});fit();

/* ---------- UI refs ---------- */
const ui=document.getElementById('ui');
const bEl=document.getElementById('b');
const minsEl=document.getElementById('mins');
const tEl=document.getElementById('t');
const infEl=document.getElementById('inf');
const startBtn=document.getElementById('start');
const stopBtn=document.getElementById('stop');
const fsBtn=document.getElementById('fs');
const dutyEl=document.getElementById('duty'); const dutyVal=document.getElementById('dutyVal');
const burstControls=document.getElementById('burstControls');
const altSecEl=document.getElementById('altSec'); const altControls=document.getElementById('altControls');
const wfSel=document.getElementById('wf');
const fman=document.getElementById('fman'); const manualHzSel=document.getElementById('manualHz');

const mode = ()=>document.querySelector('input[name="mode"]:checked').value;
const pattern = ()=>document.querySelector('input[name="pattern"]:checked').value;
const fmode = ()=>document.querySelector('input[name="fmode"]:checked').value;

function toggleSubs(){
  const p=pattern();
  burstControls.style.display=(p==='bursts'||p==='alternate')?'block':'none';
  altControls.style.display=(p==='alternate')?'block':'none';
  updateInf();
}
document.querySelectorAll('input[name="pattern"]').forEach(r=>r.addEventListener('change',toggleSubs));
dutyEl.addEventListener('input',()=>{dutyVal.textContent=`${dutyEl.value}%`;updateInf();});
altSecEl.addEventListener('input',updateInf);
wfSel.addEventListener('change',updateInf);
document.querySelectorAll('input[name="fmode"]').forEach(r=>r.addEventListener('change',updateInf));
manualHzSel.addEventListener('change',updateInf);

/* ---------- State ---------- */
let running=false, endAt=0;
let approxHz=60, autoTargetHz=30, targetHz=30;
let rafId=null, lastNow=0, phase0Ms=0;
let altPhase='continuous', altTimer=null;

/* ---------- Refresh detect with fallback ---------- */
(function detect(){
  const s=[]; let last=performance.now();
  let resolved=false;
  const fallback = setTimeout(()=>{
    if(resolved) return;
    // Safety default: behave like a 60 Hz screen
    approxHz=60; autoTargetHz=30; applyFreqMode(); updateInf(' · (fallback)');
    resolved=true;
  }, 2500);

  function finish(){
    if(resolved) return;
    resolved=true; clearTimeout(fallback);
    const sorted=s.slice().sort((a,b)=>a-b);
    const med=sorted[Math.floor(sorted.length/2)]||16.67;
    const est=1000/med;
    const cand=[50,60,75,90,100,120,144,165,180,200,240];
    approxHz=cand.reduce((best,c)=>Math.abs(c-est)<Math.abs(best-est)?c:best,60);
    autoTargetHz=(approxHz>=120)?40:30;
    applyFreqMode(); updateInf();
  }

  function tick(now){
    s.push(now-last); last=now;
    if(s.length<150){
      requestAnimationFrame(tick);
    }else{
      s.shift(); finish();
    }
  }
  try{
    requestAnimationFrame(tick);
  }catch(e){
    // In very old/odd environments
    finish();
  }
})();

/* ---------- Frequency mode handling ---------- */
function applyFreqMode(){
  const allowManual = approxHz>=120;
  manualHzSel.disabled = !allowManual;
  // If manual not allowed, force auto
  if(!allowManual && fmode()==='manual'){
    document.querySelector('input[name="fmode"][value="auto"]').checked=true;
  }
  targetHz = (fmode()==='manual' && allowManual) ? (Number(manualHzSel.value)||40) : autoTargetHz;
}

/* Re-apply on any control change that can affect frequency */
['change','input'].forEach(ev=>{
  document.getElementById('freqControls').addEventListener(ev,()=>{
    applyFreqMode(); updateInf();
    phase0Ms = performance.now(); // re-anchor phase (no jump)
  }, {passive:true});
});

/* ---------- Labels ---------- */
function phaseLabel(){
  if(pattern()==='alternate') return ` · Phase: ${altPhase}`;
  if(pattern()==='bursts')   return ' · Phase: bursts';
  return ' · Phase: continuous';
}
function updateInf(extra=''){
  applyFreqMode();
  const p=pattern(), d=`${dutyEl.value}%`;
  const pat = p==='bursts'   ? ` · Pattern: 1 Hz bursts (${d}, ${wfSel.value})`
            : p==='alternate'? ` · Pattern: alternating (${altSecEl.value}s) · Duty ${d} · ${wfSel.value}`
            : ' · Pattern: continuous';
  const ftxt = (fmode()==='manual' && approxHz>=120) ? `Manual ${targetHz} Hz` : `Auto ${targetHz} Hz`;
  const lock = (approxHz>=120) ? '≥120 Hz' : '≤90 Hz';
  infEl.textContent = `Display ≈ ${approxHz} Hz (${lock}) · ${ftxt}${phaseLabel()}${pat}${extra}`;
}

/* ---------- Clean oscillator ---------- */
function sineBrightness(hz, now){
  const phase=((now - phase0Ms) * hz / 1000) % 1;
  return 0.5*(1 + Math.sin(2*Math.PI*phase)); // 0..1
}

/* Pulse with phase-based soft edges */
function pulseBrightness(hz, now){
  const phase=((now - phase0Ms) * hz / 1000) % 1;
  const edge=0.02; // 2% soft edge
  const softstep=(x)=>{ const t=Math.max(0,Math.min(1,(x+edge)/(2*edge))); return t*t*(3-2*t); };
  const d=Math.min(Math.abs(phase-0.0), Math.abs(phase-0.5), Math.abs(phase-1.0));
  const base=(phase<0.5)?1:0;
  if(d>=edge) return base;
  const k=softstep(d*(1/edge)*2-1);
  return base ? (1-(1-k)) : k;
}

/* 1 Hz burst gate */
function burstGate(nowMs){
  const duty=(Number(dutyEl.value)||50)/100;
  const t=(nowMs - phase0Ms) % 1000;
  return (t < duty*1000) ? 1 : 0;
}

/* ---------- Painting (with cached gradient for panel-safe) ---------- */
function getGradient(){
  if(cacheGradient) return cacheGradient;
  const cx=cv.width/2, cy=cv.height/2;
  const r=Math.hypot(cv.width,cv.height)*0.55;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,'white');
  g.addColorStop(0.55,'white');
  g.addColorStop(1,'rgba(255,255,255,0)');
  cacheGradient=g; return g;
}

function paintFrame(now){
  const wf=wfSel.value;
  let L = (wf==='sine') ? sineBrightness(targetHz, now) : pulseBrightness(targetHz, now);
  const p=pattern();
  if(p==='bursts' || (p==='alternate' && altPhase==='bursts')) L *= burstGate(now);
  L = Math.max(0,Math.min(1,L));

  const md=mode();
  if(md==='clinical'){
    ctx.fillStyle = (L>0.5) ? '#fff' : '#000';
    ctx.fillRect(0,0,cv.width,cv.height);
  }else if(md==='safe'){
    const v = Number(bEl.value)||136;
    const y = Math.round(L*v);
    ctx.fillStyle = `rgb(${y},${y},${y})`;
    ctx.fillRect(0,0,cv.width,cv.height);
  }else{
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,cv.width,cv.height);
    ctx.globalAlpha = L;
    ctx.fillStyle = getGradient();
    ctx.fillRect(0,0,cv.width,cv.height);
    ctx.globalAlpha = 1;
  }
}

/* ---------- Alternation ---------- */
function startAlternation(){
  clearInterval(altTimer);
  if(pattern()!=='alternate') return;
  altPhase='continuous'; updateInf();
  const iv=Math.max(15000,Math.min(180000,(Number(altSecEl.value)||60)*1000));
  altTimer=setInterval(()=>{
    if(!running) return;
    altPhase=(altPhase==='continuous')?'bursts':'continuous';
    updateInf();
  }, iv);
}

/* ---------- Session control ---------- */
let timerId=null;
function tickTimer(){
  const r=Math.max(0, endAt - Date.now());
  const mm=String(Math.floor(r/60000)).padStart(2,'0');
  const ss=String(Math.floor((r%60000)/1000)).padStart(2,'0');
  tEl.textContent=`Remaining: ${mm}:${ss}`;
  if(r===0) stopSession();
}

function loop(now){
  if(!running) return;
  if(!phase0Ms) phase0Ms = now;
  paintFrame(now);
  lastNow = now;
  rafId = requestAnimationFrame(loop);
}

function startSession(){
  if(running) return;
  running=true;
  phase0Ms=performance.now(); lastNow=phase0Ms;
  applyFreqMode(); updateInf();
  const mins=Math.max(1,Math.min(60, Number(minsEl.value)||4));
  endAt=Date.now()+mins*60000;
  startAlternation();
  tickTimer(); timerId=setInterval(tickTimer,250);
  rafId=requestAnimationFrame(loop);
}

function stopSession(){
  if(!running) return;
  running=false;
  clearInterval(timerId); clearInterval(altTimer); altTimer=null;
  cancelAnimationFrame(rafId); rafId=null;
  ctx.fillStyle='rgb(96,96,96)'; ctx.fillRect(0,0,cv.width,cv.height);
  tEl.textContent='Remaining: 00:00'; updateInf();
}

/* ---------- UX ---------- */
fsBtn.addEventListener('click',async()=>{
  try{
    if(!document.fullscreenElement){
      await document.documentElement.requestFullscreen({navigationUI:'hide'});
    }else{
      await document.exitFullscreen();
    }
  }catch(e){}
});
document.addEventListener('fullscreenchange',()=>{
  if(document.fullscreenElement) ui.classList.add('hidden');
  else ui.classList.remove('hidden');
});
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden) phase0Ms = performance.now(); // re-anchor on return
});

/* ---------- Wire up ---------- */
startBtn.addEventListener('click',startSession);
stopBtn.addEventListener('click',stopSession);
toggleSubs();
ctx.fillStyle='rgb(32,32,32)'; ctx.fillRect(0,0,cv.width,cv.height);
</script>
</body>
</html>
